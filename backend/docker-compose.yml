version: '3.8'

services:
  # Tu Aplicación Backend
  api:
    build: .
    restart: always
    network_mode: "host" # Byers CWP DNS conflicts by using host network directly
    env_file:
      - .env
    # Override Default Command to force DB Push (Fixes SQLite/Postgres conflict)
    command: sh -c "npx prisma db push && npm start"
    environment:
      # Conectamos a localhost porque estamos en 'host mode'
      - DATABASE_URL=postgresql://user:password@127.0.0.1:5432/aliado_laboral?schema=public
      - NODE_ENV=production
      - PORT=3000
    depends_on:
      - db

  # Base de Datos PostgreSQL
  db:
    image: postgres:15-alpine
    restart: always
    network_mode: "host" # Uses host network directly
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: aliado_laboral
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # No ports section needed in host mode (uses 5432 directly)

volumes:
  postgres_data:
