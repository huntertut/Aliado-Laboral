version: '3.8'

services:
  backend:
    build: .
    environment:
      - PORT=3001
      - DATABASE_URL=file:/app/dev.db
    env_file:
      - .env
    volumes:
      - ./dev.db:/app/dev.db
    restart: always
    network_mode: "host"
    command: sh -c "node dist/index.js > /app/crash.log 2>&1 || true; tail -f /dev/null"
